name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: npm ci --prefix web
      - run: python -m pip install --disable-pip-version-check flyto-indexer==2.14.2
      - run: make lint
      - run: make verify
      - run: make demo
      - run: flyto-index verify . --full-scan --strict
